name: Deploy hofs.dev

on:
  push:
    branches: [master]
    paths:
      - 'apps/hofs.dev/**'
      - 'firebase.json'
      - '.firebaserc'
      - '.github/workflows/deploy-hofs.dev.yml'

concurrency:
  group: deploy-hofs.dev
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_HOFSDEV }}
          channelId: live
          target: hofsdev
          projectId: hofsdev

      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_HOFSDEV }}
          channelId: live
          target: hofsdevcv
          projectId: hofsdev
