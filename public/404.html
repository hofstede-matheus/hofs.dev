<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>
    404 - Post Not Found | CollectIn
  </title>
  <meta name="description" content="Page not found - looks like this post went on a networking break!" />

  <!-- Preconnect to external domains for faster loading -->
  <link rel="preconnect" href="https://chromewebstore.google.com">

  <!-- Non-blocking CSS loading for better performance -->
  <link rel="preload"
    href="./assets/index.css"
    as="style" onload="this.onload=null;this.rel='stylesheet'">
  <noscript>
    <link rel="stylesheet"
      href="./assets/index.css">
  </noscript>
  
    <link rel="stylesheet" href="assets/404.css">
      
        <link rel="icon" href="./assets/icon-16.png" sizes="16x16" type="image/png">
        <link rel="icon" href="./assets/icon-32.png" sizes="32x32" type="image/png">
        <link rel="icon" href="./assets/icon-48.png" sizes="48x48" type="image/png">
        <link rel="icon" href="./assets/icon-128.png" sizes="128x128" type="image/png">
</head>

  <body>
    <header class="site-header">
  <div class="container nav">
    <a class="logo" href="./index.html" aria-label="CollectIn home">
      <img src="./assets/icon-48.png" alt="CollectIn logo" class="logo-icon">
      <span class="logo-text">CollectIn</span>
    </a>
    <nav class="nav-links" aria-label="Primary">
      <a href="./index.html#features">Features</a>
      <a href="./index.html#how-it-works">How it works</a>
      <a href="./index.html#faq">FAQ</a>
    </nav>
    <a class="button primary"
      href="https://chromewebstore.google.com/detail/alfloghadjklabbfhilpnahjhiaadimh?utm_source=item-share-cb"
      id="cta-top">Add to Chrome</a>
  </div>
</header>

      <main>
        <section class="error-container">
          <div class="container">
            <div class="error-animation">
              <h1 class="big-404">404</h1>
            </div>

            <h2 class="error-title">Oops! This post seems to be uncollected</h2>

            <p class="error-message">
              Looks like this page went on a networking break and forgot to save itself to a collection! Please go to
              the home page.
            </p>

            <div class="search-simulation">
              <div class="search-bar">
                <span class="search-icon">🔍</span>
                <span class="search-text">Searching for your page<span class="loading-dots"></span></span>
                <span class="typing-indicator"></span>
              </div>
            </div>


          </div>
        </section>
      </main>

      <footer class="site-footer">
  <div class="container foot">
    <div class="left">
      <img src="./assets/icon-48.png" alt="CollectIn logo" class="logo-icon">
    </div>
    <div class="right muted">
      <a href="./privacy.html">Privacy Policy</a> &middot;
      &copy; <span id="year">2025</span> — Not affiliated with LinkedIn.
    </div>
  </div>
</footer>
        <script>
          // Simulate typing in search bar
          const searchText = document.querySelector('.search-text');
          const phrases = [
            'Searching for your page',
            'Looking through collections',
            'Checking saved posts',
            'Organizing the chaos',
            'Finding your content'
          ];

          let currentPhrase = 0;

          setInterval(() => {
            currentPhrase = (currentPhrase + 1) % phrases.length;
            searchText.innerHTML = phrases[currentPhrase] + '<span class="loading-dots"></span>';
          }, 4000);
        </script>
  </body>

</html>
